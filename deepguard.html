<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeepGuard AI</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;600&display=swap');

*{margin:0;padding:0;box-sizing:border-box}
body{background:#03060c;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;font-family:'Syne'}

.df-root{width:100%;max-width:1200px;background:#080c14;border-radius:24px;color:#e8f0fe;overflow:hidden;box-shadow:0 20px 40px #000}

.header{padding:20px 28px;border-bottom:1px solid #00f0c822;display:flex;justify-content:space-between;align-items:center}
.logo-text{font-weight:800;letter-spacing:2px}
.status{font-family:monospace;font-size:12px;color:#00f0c8}

.main{display:flex;flex-wrap:wrap}
.upload,.result{padding:28px}
.upload{flex:1;border-right:1px solid #00f0c822}
.result{width:350px;background:#0003}

.drop{
border:1.5px dashed #00f0c866;border-radius:16px;height:240px;
display:flex;align-items:center;justify-content:center;cursor:pointer;
position:relative;background:#00f0c805
}
.drop:hover{background:#00f0c815}
.drop img{position:absolute;width:100%;height:100%;object-fit:contain;display:none}

.meta{display:none;margin-top:12px;font-size:11px;font-family:monospace;color:#aaa}
.btns{display:flex;gap:10px;margin-top:12px}
button{flex:1;padding:10px;border-radius:10px;border:1px solid #00f0c855;background:transparent;color:#00f0c8;cursor:pointer}
button:hover{background:#00f0c822}
.analyze{margin-top:10px;width:100%;padding:14px;font-weight:bold}

.idle{text-align:center;opacity:.6;margin-top:40px}
.result-card{display:none}

.verdict{text-align:center;padding:20px;border-radius:14px;margin-bottom:20px}
.fake{background:#ff000022}
.real{background:#00ff6622}
.uncertain{background:#ffaa0022}

.bar{height:6px;background:#fff1;border-radius:10px;overflow:hidden}
.fill{height:100%;width:0;background:#00f0c8}

@media(max-width:800px){
.result{width:100%;border-top:1px solid #00f0c822}
.upload{border:none}
}
</style>
</head>

<body>

<div class="df-root">
<div class="header">
<div class="logo-text">DeepGuard AI</div>
<div class="status">● ONLINE</div>
</div>

<div class="main">

<div class="upload">
<div class="drop" id="drop">
<img id="img">
<span>Drop image</span>
<input type="file" id="file" style="position:absolute;inset:0;opacity:0">
</div>

<div class="meta" id="meta"></div>

<div class="btns">
<button id="remove">Remove</button>
<button id="add">Add</button>
</div>

<button class="analyze" id="analyze" disabled>Analyze</button>
</div>

<div class="result">
<div class="idle" id="idle">Upload image to start</div>

<div class="result-card" id="card">
<div class="verdict" id="verdict"></div>

<div class="bar"><div class="fill" id="bar"></div></div>
</div>
</div>

</div>
</div>

<script>
const fileInput=document.getElementById('file'),
drop=document.getElementById('drop'),
img=document.getElementById('img'),
meta=document.getElementById('meta'),
analyze=document.getElementById('analyze'),
removeBtn=document.getElementById('remove'),
addBtn=document.getElementById('add'),
idle=document.getElementById('idle'),
card=document.getElementById('card'),
verdict=document.getElementById('verdict'),
bar=document.getElementById('bar');

let file=null;

function load(f){
file=f;
img.src=URL.createObjectURL(f);
img.style.display='block';
meta.style.display='block';
meta.innerText=`${f.name} • ${(f.size/1024).toFixed(0)} KB`;
analyze.disabled=false;
}

fileInput.onchange=e=>load(e.target.files[0]);

drop.ondrop=e=>{
e.preventDefault();
load(e.dataTransfer.files[0]);
};
drop.ondragover=e=>e.preventDefault();

removeBtn.onclick=()=>{
file=null;
img.style.display='none';
meta.style.display='none';
analyze.disabled=true;
card.style.display='none';
idle.style.display='block';
};

addBtn.onclick=()=>fileInput.click();

analyze.onclick=async()=>{
if(!file)return;
analyze.disabled=true;
analyze.innerText='Scanning...';

const fd=new FormData();
fd.append('image',file);

try{
const res=await fetch('/predict',{method:'POST',body:fd});
const d=await res.json();

const score=d.fake_score;
const pct=Math.round(score*100);

verdict.className='verdict '+(score>.7?'fake':score<.3?'real':'uncertain');
verdict.innerText=score>.7?'FAKE':score<.3?'REAL':'UNCERTAIN';

bar.style.width=pct+'%';

idle.style.display='none';
card.style.display='block';

}catch(e){
alert('Backend error');
}

analyze.disabled=false;
analyze.innerText='Analyze';
};
</script>

</body>
</html>
